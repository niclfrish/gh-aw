  fuzz:
    # Only run fuzz tests on main branch (10s is insufficient for PRs)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-fuzz-${{ matrix.group }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
        - group: Parser
          tests: >-
            FuzzParseFrontmatter:./pkg/parser/
            FuzzScheduleParser:./pkg/parser/
            FuzzRuntimeImportExpressionValidation:./pkg/parser/
            FuzzRuntimeImportProcessExpressions:./pkg/parser/
        - group: Workflow-Core
          tests: >-
            FuzzExpressionParser:./pkg/workflow/
            FuzzMentionsFiltering:./pkg/workflow/
            FuzzSanitizeOutput:./pkg/workflow/
            FuzzSanitizeIncomingText:./pkg/workflow/
            FuzzSanitizeLabelContent:./pkg/workflow/
            FuzzWrapExpressionsInTemplateConditionals:./pkg/workflow/
        - group: Workflow-Parsing
          tests: >-
            FuzzYAMLParsing:./pkg/workflow/
            FuzzTemplateRendering:./pkg/workflow/
            FuzzInputValidation:./pkg/workflow/
            FuzzNetworkPermissions:./pkg/workflow/
            FuzzSafeJobConfig:./pkg/workflow/
            FuzzParseLabelTriggerShorthand:./pkg/workflow/
        - group: Workflow-Triggers
          tests: >-
            FuzzExpandLabelTriggerShorthand:./pkg/workflow/
            FuzzValidateNoTemplateInjection:./pkg/workflow/
            FuzzRemoveHeredocContent:./pkg/workflow/
            FuzzMarkdownCodeRegionBalancer:./pkg/workflow/
            FuzzParseTriggerShorthand:./pkg/workflow/
            FuzzTriggerIRToYAMLMap:./pkg/workflow/
            FuzzParseInputDefinition:./pkg/workflow/
            FuzzParseInputDefinitions:./pkg/workflow/
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      env:
        GOPROXY: "https://proxy.golang.org,direct"
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          if go mod download; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
              echo "This indicates that proxy.golang.org is unreachable or returning errors"
              echo "- Network connectivity: checking proxy.golang.org..."
              if curl -s -I --connect-timeout 5 https://proxy.golang.org/golang.org/@v/list >/dev/null 2>&1; then
                echo "  ✓ proxy.golang.org is reachable"
              else
                echo "  ✗ proxy.golang.org is NOT reachable"
              fi
              echo "Please check network connectivity or re-run the workflow once the proxy recovers"
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Run fuzz tests (${{ matrix.group }})
      run: |
        set -o pipefail
        # Create directory for fuzz results
        mkdir -p fuzz-results

        # Helper function to run fuzz test and handle context deadline
        # Go fuzz tests can exit with status 1 and "context deadline exceeded" when
        # they reach the -fuzztime limit. We treat this as expected success to allow
        # all fuzz targets to run instead of stopping at the first timeout.
        run_fuzz_test() {
          local fuzz_name=$1
          local package=$2
          local tags_arg=""
          local output_file="fuzz-results/${fuzz_name}.txt"

          if [ "${fuzz_name}" = "FuzzSanitizeOutput" ] || [ "${fuzz_name}" = "FuzzSanitizeIncomingText" ]; then
            tags_arg="-tags=integration"
          fi
          
          echo "Running ${fuzz_name}..."
          if go test -run='^$' -fuzz="^${fuzz_name}$" -fuzztime=10s ${tags_arg:+"${tags_arg}"} "${package}" 2>&1 | tee "${output_file}"; then
            echo "✅ ${fuzz_name} completed successfully"
            return 0
          else
            # Check if the failure was due to context deadline (expected)
            if grep -q "context deadline exceeded" "${output_file}"; then
              echo "✅ ${fuzz_name} completed (context deadline reached as expected)"
              return 0
            else
              echo "❌ ${fuzz_name} failed with unexpected error"
              return 1
            fi
          fi
        }

        # Run fuzz tests for this matrix group
        for entry in ${{ matrix.tests }}; do
          fuzz_name="${entry%%:*}"
          package="${entry##*:}"
          run_fuzz_test "${fuzz_name}" "${package}"
        done

        # Copy fuzz corpus data (testdata/fuzz directories)
        echo "Copying fuzz corpus data..."
        find ./pkg -path "*/testdata/fuzz" -type d | while read -r dir; do
          pkg_name=$(echo "$dir" | sed 's|^\./pkg/||' | sed 's|/testdata/fuzz$||')
          echo "Copying corpus from $dir to fuzz-results/corpus/$pkg_name/"
          mkdir -p "fuzz-results/corpus/$pkg_name"
          cp -r "$dir"/* "fuzz-results/corpus/$pkg_name/" 2>/dev/null || echo "No corpus data in $dir"
        done

    - name: Upload fuzz test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: fuzz-results-${{ matrix.group }}
        path: fuzz-results/
        retention-days: 14

