      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          if go mod download; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
              echo "This may indicate that proxy.golang.org is unreachable"
              echo "Please check network connectivity or consider vendoring dependencies"
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Build Linux binary for Alpine
      run: make build-linux

    - name: Build Alpine Docker image
      run: |
        echo "Building Alpine Docker image..."
        docker build -t gh-aw-alpine:test \
          --build-arg BINARY=gh-aw-linux-amd64 \
          -f Dockerfile .
        echo "✅ Alpine Docker image built successfully"

    - name: Test Docker image basic commands
      run: |
        echo "Testing Docker image basic commands..."
        docker run --rm gh-aw-alpine:test --version
        docker run --rm gh-aw-alpine:test --help
        echo "✅ Basic commands work"

    - name: Create test workflow in container
      run: |
        echo "Creating test workflow file..."
        mkdir -p test-workspace/.github/workflows
        cat > test-workspace/.github/workflows/test-alpine.md << 'EOF'
        ---
        on: push
        engine: copilot
        ---
        # Test Workflow for Alpine Container

        This is a simple test workflow to verify the compile command works correctly in Alpine container.

        ## Task
        Echo hello from Alpine container.
        EOF
        echo "✅ Test workflow created"

    - name: Run compile through Alpine container
      run: |
        echo "Running compile command through Alpine container..."
        docker run --rm \
          -v "$(pwd)/test-workspace:/workspace" \
          -w /workspace \
          gh-aw-alpine:test compile test-alpine --verbose

        echo "✅ Compile command executed"

    - name: Verify lock file generation
      run: |
        echo "Verifying lock file was generated..."
        if [ -f "test-workspace/.github/workflows/test-alpine.lock.yml" ]; then
          echo "✅ Lock file generated successfully"
          echo ""
          echo "Lock file contents:"
          head -20 test-workspace/.github/workflows/test-alpine.lock.yml
        else
          echo "❌ Lock file not found"
          ls -la test-workspace/.github/workflows/
          exit 1
        fi

    - name: Generate test summary
      if: always()
      run: |
        echo "## Alpine Container Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "This test verifies that:" >> $GITHUB_STEP_SUMMARY
        echo "1. The Alpine Docker image can be built successfully" >> $GITHUB_STEP_SUMMARY
        echo "2. The gh-aw binary works correctly in Alpine Linux" >> $GITHUB_STEP_SUMMARY
        echo "3. The compile command can process workflows in the container" >> $GITHUB_STEP_SUMMARY
        echo "4. Lock files are generated correctly" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "test-workspace/.github/workflows/test-alpine.lock.yml" ]; then
          echo "✅ All tests passed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Lock file generation failed" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Clean up test files
      if: always()
      run: |
        rm -rf test-workspace

  safe-outputs-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Run Safe Outputs Conformance Checker
      id: conformance
      continue-on-error: true
      run: |
        echo "## Safe Outputs Conformance Check" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Run the conformance checker and capture output
        if ./scripts/check-safe-outputs-conformance.sh > conformance-output.txt 2>&1; then
          echo "✅ All conformance checks passed" >> $GITHUB_STEP_SUMMARY
          EXIT_CODE=0
        else
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "⚠️ Critical conformance issues found (treated as warning)" >> $GITHUB_STEP_SUMMARY
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "⚠️ High priority conformance issues found (treated as warning)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Conformance check completed with warnings" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Conformance Check Output" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat conformance-output.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        # Also output to console for visibility
        echo "=== Conformance Check Results ==="
        cat conformance-output.txt

        # Always succeed (treat as warning only)
        exit 0

    - name: Upload conformance report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: safe-outputs-conformance-report
        path: conformance-output.txt
        retention-days: 7

  notify-failure:
    name: Notify on CGO Failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && github.ref == 'refs/heads/main'
    needs:
    - test
    - canary-go
    - build
    - build-wasm
    - validate-yaml
    - bench
    - check-validator-sizes
    - lint-go
    - actions-build
    - fuzz
    - security
    - security-scan
    - mcp-server-compile-test
    - cross-platform-build
    - alpine-container-test
    - safe-outputs-conformance
    permissions:
      issues: write
    steps:
    - name: Check for job failures and create issue
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3   # v9
      with:
        script: |
          const needs = ${{ toJSON(needs) }};
          const failedJobs = Object.entries(needs)
            .filter(([, job]) => job.result === 'failure')
            .map(([name]) => name);
          const hasFuzzFailure = failedJobs.some(name => name === 'fuzz' || name.startsWith('fuzz-'));

          if (failedJobs.length === 0) {
            core.info('No jobs failed. Nothing to do.');
            return;
          }

          core.info(`Failed jobs: ${failedJobs.join(', ')}`);

          // Check for an existing open CGO failure issue to avoid duplicates
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: 'cgo-failure',
            state: 'open',
          });

          if (existingIssues.data.length > 0 && !hasFuzzFailure) {
            core.info(`Existing CGO failure issue #${existingIssues.data[0].number} is still open. Skipping.`);
            return;
          }

          if (hasFuzzFailure) {
            const existingFuzzIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cgo-fuzz-failure',
              state: 'open',
            });

            const existingFuzzIssueForRun = existingFuzzIssues.data.find(issue =>
              issue.title.includes(`Run #${context.runNumber}`),
            );
            if (existingFuzzIssueForRun) {
              core.info(`Fuzz failure issue #${existingFuzzIssueForRun.number} already exists for run #${context.runNumber}. Skipping.`);
              return;
            }
          }

          // Ensure required labels exist, creating them if missing
          const requiredLabels = [['cookie', 'e4e669'], ['cgo-failure', 'b60205']];
          if (hasFuzzFailure) {
            requiredLabels.push(['cgo-fuzz-failure', 'd93f0b']);
          }

          for (const [label, color] of requiredLabels) {
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color });
              }
            }
          }

          // Fetch all jobs for this run to get direct job links
          const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
            per_page: 100,
          });

          // Build a map from job name to job URL for failed jobs
          const jobUrlMap = {};
          for (const job of jobsResponse.data.jobs) {
            if (failedJobs.includes(job.name)) {
              jobUrlMap[job.name] = job.html_url;
            }
          }

          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const expiresAt = new Date(Date.now() + 4 * 60 * 60 * 1000).toISOString();

          // Format expiration line using the gh-aw-expires XML comment format
          const expiresDate = new Date(expiresAt);
          const humanReadableDate = expiresDate.toLocaleString('en-US', {
            dateStyle: 'medium',
            timeStyle: 'short',
            timeZone: 'UTC',
          });
          const expirationLine = `- [x] expires <!-- gh-aw-expires: ${expiresAt} --> on ${humanReadableDate} UTC`;

          const body = [
            `## CGO Workflow Failure`,
            ``,
            `Workflow run [#${context.runNumber}](${runUrl}) on the \`main\` branch completed with failed jobs.`,
            ``,
            `| Field | Value |`,
            `| --- | --- |`,
            `| Run ID | ${context.runId} |`,
            `| Commit | ${context.sha} |`,
            `| Expires | ${expiresAt} |`,
            ``,
            `## Failed Jobs`,
            ``,
            // Map job names to direct links; fall back to plain text if a job ID wasn't found
            ...failedJobs.map(name => jobUrlMap[name]
              ? `- [\`${name}\`](${jobUrlMap[name]})`
              : `- \`${name}\``),
            ``,
            `> This issue expires at ${expiresAt}. Please investigate the failed jobs above and close once resolved.`,
            `> ${expirationLine}`,
          ];

          if (hasFuzzFailure) {
            body.splice(
              4,
              0,
              `Detected failure in the \`fuzz\` job matrix. A dedicated fuzz failure label was applied so this run is tracked.`,
              ``,
            );
          }

          const issueBody = body.join('\n');

          const issueLabels = ['cookie', 'cgo-failure'];
          if (hasFuzzFailure) {
            issueLabels.push('cgo-fuzz-failure');
          }

          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: hasFuzzFailure
              ? `[CGO][FUZZ] Workflow failure on main - Run #${context.runNumber}`
              : `[CGO] Workflow failure on main - Run #${context.runNumber}`,
            body: issueBody,
            labels: issueLabels,
          });

          core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
